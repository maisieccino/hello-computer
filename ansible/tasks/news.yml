- name: Miniflux started
  become: true
  become_user: wallabag
  ansible.builtin.systemd_service:
    name: miniflux.service
    daemon_reload: true
    state: "{{ should_restart | ternary('restarted', 'started') }}"
    enabled: true
    scope: user
  vars:
    should_restart: "{{ systemd_files.changed or config_file.changed }}"
